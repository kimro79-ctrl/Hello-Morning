group 'com.background.sms'
version '1.0-SNAPSHOT'

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        # AGP(Android Gradle Plugin) 버전을 명시하여 android 블록을 인식하게 합니다.
        classpath 'com.android.tools.build:gradle:8.2.1'
    }
}

rootProject.allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

# ✅ 이 줄이 반드시 있어야 android { ... } 블록을 사용할 수 있습니다.
apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "com.background.sms"
    compileSdk 34

    defaultConfig {
        minSdkVersion 21
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.10"
}
