version: 0.0.4

environment:
  # ✅ SDK 범위를 수정
  sdk: '>=2.12.0 <4.0.0'
  flutter: ">=1.12.13+hotfix.5"

flutter:
  plugin:
    platforms:
      android:
        package: com.background.sms
        pluginClass: BackgroundSmsPlugin
