name: contacts_service
description: Flutter plugin for reading and managing contacts.
version: 0.6.3
homepage: https://github.com/baseflow/flutter-contacts_service

environment:
  # ✅ SDK 범위를 2.12.0 이상으로 수정하여 Null Safety 에러 해결
  sdk: '>=2.12.0 <4.0.0'
  flutter: ">=1.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.contacts.service
        pluginClass: ContactsServicePlugin
