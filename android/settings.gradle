pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

dependencyResolutionManagement {
    // [수정] 모드를 완전히 끄거나 더 유연한 모드로 변경합니다.
    // 프로젝트 수준의 repositories 설정을 허용하여 라이브러리 충돌을 해결합니다.
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "android"
include ":app"

// 플러그인 자동 연결 코드
def plugins = new Properties()
def pluginsFile = new File(settingsDir.parentFile, '.flutter-plugins')
if (pluginsFile.exists()) {
    pluginsFile.withReader('UTF-8') { reader -> plugins.load(reader) }
}

plugins.each { name, path ->
    def pluginDirectory = file(path).absoluteFile
    include ":$name"
    project(":$name").projectDir = file("$pluginDirectory/android")
}
