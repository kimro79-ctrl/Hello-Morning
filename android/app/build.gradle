plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// ... 중략 (local.properties 읽는 부분)

android {
    // 파이어베이스 콘솔에 새로 등록한 소문자 이름과 일치시켜야 합니다.
    namespace "com.hello_morning" 
    compileSdkVersion 34

    defaultConfig {
        // 여기가 google-services.json에 적힌 패키지명과 100% 일치해야 함
        applicationId "com.hello_morning"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }
    
    // ... 후략
}
