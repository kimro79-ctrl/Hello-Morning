def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    [span_2](start_span)// 빌드 스크립트와 일치하도록 네임스페이스 명시[span_2](end_span)
    namespace "com.sodoma.daily_safety" 
    
    // 구글 플레이 정책 대응: API 35 (Android 15)
    compileSdkVersion 35
    ndkVersion flutter.ndkVersion

    compileOptions {
        [span_3](start_span)[span_4](start_span)// 최신 빌드 환경을 위해 Java 17 사용[span_3](end_span)[span_4](end_span)
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.sodoma.daily_safety"
        minSdkVersion 21
        
        // 🚨 핵심 수정 사항: 타겟 SDK를 35로 설정
        targetSdkVersion 35 
        
        [span_5](start_span)[span_6](start_span)// GitHub Actions에서 자동 생성되는 버전값 적용[span_5](end_span)[span_6](end_span)
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            [span_7](start_span)[span_8](start_span)// 보안을 위해 환경 변수 사용[span_7](end_span)[span_8](end_span)
            storeFile file('key.jks')
            storePassword System.getenv("STORE_PASSWORD")
            keyAlias System.getenv("ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            
            // 코드 최적화 및 리소스 축소 활성화
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    [span_9](start_span)// buildscript에 선언된 kotlin_version 참조[span_9](end_span)
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
