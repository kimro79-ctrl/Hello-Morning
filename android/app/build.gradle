plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.hello_morning"

    compileSdkVersion 35

    defaultConfig {
        applicationId "com.example.hello_morning"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 250
        versionName "1.2.50"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            shrinkResources false
            minifyEnabled false
        }
    }
}

flutter {
    source "../.."
}
