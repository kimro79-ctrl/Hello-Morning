buildscript {
    ext.kotlin_version = '1.9.22' // 1.9.10에서 상향
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 빌드 도구 버전을 8.2.1 이상으로 상향 (API 35 대응)
        classpath 'com.android.tools.build:gradle:8.2.1' 
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'com.google.gms:google-services:4.4.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
