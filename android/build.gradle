buildscript {
    ext.kotlin_version = '1.9.10'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // ✅ AGP 버전은 8.1.0 이상을 유지해야 API 35 빌드가 가능합니다.
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'com.google.gms:google-services:4.4.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// ✅ [깃허브 빌드 필수 코드] background_sms의 네임스페이스 오류를 강제로 주입하여 빌드를 통과시킵니다.
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            if (project.name == 'background_sms') {
                project.android {
                    // 구식 패키지의 누락된 네임스페이스를 빌드 시점에 강제 설정
                    namespace = 'com.github.clans.background_sms'
                }
            }
        }
    }
}
