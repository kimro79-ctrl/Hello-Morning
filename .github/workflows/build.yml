name: Build AAB (Auto Versioning & Key Gen)

on:
  workflow_dispatch: # 수동으로 빌드 시작 버튼을 누를 때 실행

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate New Keystore
        # GitHub Secrets에 등록한 비번들로 jks 파일을 실시간 생성합니다.
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias ${{ secrets.ALIAS }} \
          -storepass ${{ secrets.STORE_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          -dname "CN=Sodoma, OU=Dev, O=Safety, L=Seoul, S=Seoul, C=KR"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Build AAB
        # github.run_number를 사용해 빌드할 때마다 숫자가 1씩 자동으로 올라갑니다.
        run: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.0-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
