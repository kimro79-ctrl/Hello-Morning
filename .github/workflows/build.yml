name: Final Success Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ✅ [수정] Base64 인코딩을 안 하셨으므로, 원문을 그대로 파일로 만듭니다.
      - name: Create Google Services JSON
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # ✅ Keystore는 이진 파일이라 원문 등록이 안 되므로, 이건 Base64 방식 유지 필수입니다.
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Pub Get
        run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hello-Morning-Release
          path: build/app/outputs/bundle/release/app-release.aab
