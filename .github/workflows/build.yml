name: Build AAB (Auto Versioning)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 설정
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 새 키스토어 자동 생성
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias ${{ secrets.ALIAS }} \
          -storepass ${{ secrets.STORE_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          -dname "CN=Sodoma, OU=Dev, O=Safety, L=Seoul, S=Seoul, C=KR"

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: 의존성 설치
        run: flutter pub get

      - name: AAB 빌드 (버전 자동 증가)
        run: |
          # --build-name은 스토어에 표시되는 버전 (예: 1.0.0)
          # --build-number는 내부 관리용 번호 (빌드할 때마다 1, 2, 3... 자동으로 증가)
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.0-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
