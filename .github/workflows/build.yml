name: Ultimate Stable Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ✅ 1. 의존성 설치 (로컬 경로를 자동으로 읽어옵니다)
      - name: Install dependencies
        run: flutter pub get

      # ✅ 2. 보안 파일 복원 (이것만 있으면 됩니다)
      - name: Decode Secrets
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # ✅ 3. 빌드 (이미 우리가 로컬에서 고쳤기 때문에 더 이상 에러 안 납니다)
      - name: Build AAB
        run: flutter build appbundle --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hello-Morning-Final
          path: build/app/outputs/bundle/release/app-release.aab
