name: Ultimate Success Build (Zero-Defect Patch)

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      # ✅ 1. 의존성 설치
      - name: Install dependencies
        run: flutter pub get

      # ✅ 2. [완전판] 모든 플러그인 Namespace 자동 패치 및 검증
      - name: Fix ALL Flutter plugin namespace
        run: |
          echo "Scanning all plugins in pub-cache..."

          find $HOME/.pub-cache -type f -name "build.gradle" | while read FILE; do
            if grep -q "com.android.library" "$FILE"; then
              if ! grep -q 'namespace "' "$FILE" && ! grep -q "namespace =" "$FILE"; then
                
                # 변수 오타 수정 및 안전한 네임스페이스 생성
                PKG_DIR_NAME=$(basename $(dirname $(dirname "$FILE")))
                SAFE_PKG_NAME=$(echo "$PKG_DIR_NAME" | sed 's/[^a-zA-Z0-9]/./g')

                echo "Patching: $FILE → $SAFE_PKG_NAME"

                # 공백 대응 정규식 패턴 적용
                sed -i '/android[[:space:]]*{/a\    namespace "com.auto.generated.'"$SAFE_PKG_NAME"'"' "$FILE"
              fi
            fi
          done

          echo "---------------------------------------"
          echo "Verification: Count of patched namespaces"
          grep -r "namespace \"com.auto.generated" $HOME/.pub-cache | wc -l
          echo "Global patching completed."

      # ✅ 3. Google Services JSON 복원 (Base64)
      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      # ✅ 4. Keystore 복원
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # ✅ 5. AAB 빌드
      - name: Build AAB
        run: flutter build appbundle --release
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hello-Morning-Perfect-Release
          path: build/app/outputs/bundle/release/app-release.aab
