name: Build AAB & Extract JKS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 설정
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 새 키스토어 자동 생성 및 보관
        run: |
          keytool -genkey -v -keystore android/app/upload-keystore.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias ${{ secrets.ALIAS }} \
          -storepass ${{ secrets.STORE_PASSWORD }} \
          -keypass ${{ secrets.KEY_PASSWORD }} \
          -dname "CN=Sodoma, OU=Dev, O=Safety, L=Seoul, S=Seoul, C=KR"

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: 의존성 설치
        run: flutter pub get

      - name: AAB 빌드 (버전 자동 증가)
        run: |
          flutter build appbundle --release \
            --build-name=1.0.0 \
            --build-number=${{ github.run_number }}
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}

      - name: 결과물 모으기 (AAB + JKS)
        # 배포용 폴더를 만들어서 두 파일을 한곳에 모읍니다.
        run: |
          mkdir -p build_output
          cp build/app/outputs/bundle/release/app-release.aab build_output/app-release-v1.0.0-${{ github.run_number }}.aab
          cp android/app/upload-keystore.jks build_output/upload-keystore.jks

      - name: AAB와 JKS 강제 추출 업로드
        uses: actions/upload-artifact@v4
        with:
          name: Release-Files-v${{ github.run_number }}
          path: build_output/
