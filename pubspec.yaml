name: hello_morning
description: "1인가구 안심 지키미 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' # 본인의 Flutter SDK 버전에 맞게 조절

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  contacts_service: ^0.6.3
  permission_handler: ^11.3.0
  intl: ^0.19.0
  background_sms: ^0.0.1
  geolocator: ^10.1.0
  # 만약 포그라운드 서비스를 사용한다면 추가 (선택사항)
  flutter_foreground_task: ^6.1.1 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ✅ 이미지 에셋 설정 (파일명에 공백이 없는지 확인하세요)
  assets:
    - assets/smile.png
