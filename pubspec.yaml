name: hello_morning
description: "1인가구 안심 지키미 앱"
publish_to: 'none'
version: 1.2.50+250

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.2
  
  # ✅ 로컬 path 대신 정식 버전으로 교체 (성공 확률 95%)
  background_sms: ^0.0.4
  contacts_service: ^0.6.3
  
  permission_handler: ^11.3.0
  geolocator: ^11.0.0
  intl: ^0.19.0
  flutter_foreground_task: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# ✅ 이전 성공 코드 방식 유지
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"

flutter:
  uses-material-design: true
  assets:
    - icon.png
    - assets/smile.png
