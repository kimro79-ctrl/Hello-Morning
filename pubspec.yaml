name: hello_morning
description: "1인가구 안심 지키미"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 기본
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  permission_handler: ^11.3.1
  geolocator: ^11.0.0

  # foreground service
  flutter_foreground_task: ^8.0.0

  # 연락처 (안정 버전)
  flutter_contacts: ^1.1.7+1

  # SMS (안드로이드 최신 대응)
  telephony: ^0.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/
    - icon.png
