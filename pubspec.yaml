  # ✅ 최신 버전으로 고정 (isRunningService 함수 포함 버전)
  flutter_foreground_task: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
