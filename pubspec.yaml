name: hello_morning
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  contacts_service: ^0.6.3
  permission_handler: ^11.3.0
  intl: ^0.19.0
  background_sms: ^0.0.4
