name: hello_morning
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  # API 35와 Flutter 3.22+ 버전을 원활하게 지원하기 위한 설정입니다.
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.2
  background_sms: ^0.0.4
  permission_handler: ^11.3.0
  contacts_service: ^0.6.3
  geolocator: ^11.0.0
  intl: ^0.19.0
  flutter_foreground_task: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # ✅ 앱 아이콘 생성을 위한 패키지
  flutter_launcher_icons: ^0.13.1

# ✅ 앱 아이콘 설정 (독립적인 섹션으로 유지)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"

# ✅ Flutter 설정 (에셋 및 머티리얼 디자인)
flutter:
  uses-material-design: true
  assets:
    - icon.png
    - assets/smile.png
