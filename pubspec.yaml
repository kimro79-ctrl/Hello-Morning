name: hello_morning
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  firebase_core: ^2.27.0
  cloud_firestore: ^4.15.8
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.2
  background_sms: ^0.0.4
  permission_handler: ^11.3.0
  contacts_service: ^0.6.3
  geolocator: ^11.0.0
  intl: ^0.19.0
  flutter_foreground_task: ^6.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # ✅ 아이콘 생성을 위해 이 줄이 반드시 포함되어야 합니다.
  flutter_launcher_icons: ^0.13.1

# ✅ 최상위 레벨(들여쓰기 없음)에 위치해야 합니다.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png" # 프로젝트 루트에 icon.png 파일이 있어야 합니다.

# ✅ 최상위 레벨에 단 한 번만 선언되어야 합니다.
flutter:
  uses-material-design: true
  assets:
    - icon.png
    - assets/smile.png
