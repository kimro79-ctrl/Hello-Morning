name: hello_morning
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  flutter_contacts: ^1.1.9   # ✅ 수정 (1.1.9.2 → 1.1.9)
  permission_handler: ^11.3.0
  intl: ^0.19.0
  telephony: ^0.2.0
  geolocator: ^11.0.0
  flutter_foreground_task: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon.png"

flutter:
  uses-material-design: true

  assets:
    - icon.png
    - assets/smile.png
