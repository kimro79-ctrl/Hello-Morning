name: hello_morning
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.3.3
  # 최신 안드로이드 SDK 35 빌드 대응을 위해 교체
  flutter_sms_plus: ^0.0.1
  flutter_contacts: ^1.1.9+2
  permission_handler: ^11.3.1
  intl: ^0.19.0
  geolocator: ^12.0.0
  flutter_foreground_task: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 들여쓰기 주의: flutter: 보다 2칸 안으로, assets: 보다 2칸 안으로 작성됨
  assets:
    - icon.png
    - assets/smile.png
